<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSM Watches</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#fff;color:#111}
.top{background:#000;color:#d4af37;padding:10px;text-align:center;font-size:14px}
header{display:flex;justify-content:space-between;align-items:center;padding:18px 24px;border-bottom:1px solid #ddd}
.logo{text-align:center;flex:1}
.logo img{width:90px}
.logo h1{margin:8px 0 0;letter-spacing:6px}
.logo p{margin:4px 0;color:#b08d2f}
nav{background:#111;color:#d4af37;text-align:center;padding:14px}
.hero{display:flex;flex-wrap:wrap;background:#000;color:#fff}
.hero img{max-width:50%;min-width:320px;flex:1;object-fit:cover}
.hero .txt{flex:1;padding:60px;text-align:center}
.btn{display:inline-block;padding:14px 28px;border:1px solid #d4af37;color:#d4af37;text-decoration:none;margin-top:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;padding:30px}
.card{border:1px solid #ddd;padding:10px;text-align:center}
.card img{width:100%}
footer{background:#111;color:#fff;padding:20px;text-align:center}
</style>
</head>
<body>
<div class="top">HOLIDAY SALE • FREE SHIPPING</div>
<header>
<div>☰</div>
<div class="logo">
<img src="BF006172-FC98-4F55-ABDD-...." alt="Logo">
<h1>CSM WATCHES</h1>
<p>LUXURY TIMEPIECES</p>
</div>
<div>🛒</div>
</header>
<nav>HOME • SHOP • BEST SELLERS • CONTACT</nav>
<section class="hero">
<img src="IMG_3873.jpeg" alt="">
<div class="txt">
<h2 style="font-size:56px;margin:0;color:#d4af37">TIMELESS</h2>
<h2 style="font-size:56px;margin:0">LUXURY</h2>
<p>Exclusive watches crafted to stand out.</p>
<a class="btn" href="#products">SHOP NOW</a>
</div>
</section>
<h2 style="text-align:center;padding-top:20px">BEST SELLERS</h2>
<section class="grid" id="products">
<div class="card"><img src="IMG_3873.jpeg"><h3>Iced Roman Watch</h3></div>
<div class="card"><img src="IMG_3874.jpeg"><h3>Skeleton Watch</h3></div>
<div class="card"><img src="IMG_3875.jpeg"><h3>Arabic Dial</h3></div>
<div class="card"><img src="IMG_3876.jpeg"><h3>Skeleton Chrono</h3></div>
</section>
<footer>© 2026 CSM Watches</footer>
</body>
</html>
